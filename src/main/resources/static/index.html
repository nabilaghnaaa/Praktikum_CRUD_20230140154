<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manajemen User - Praktikum 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>

<body class="container mt-5">

<h2 class="mb-4">Daftar Pengguna</h2>

<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title" id="formTitle">Tambah User</h5>

        <form id="userForm">
            <input type="hidden" id="userId">

            <div class="row g-3">
                <div class="col-md-5">
                    <label for="userName" class="form-label">Nama</label>
                    <input type="text"
                           id="userName"
                           class="form-control"
                           placeholder="Masukkan nama"
                           required>
                </div>

                <div class="col-md-3">
                    <label for="userAge" class="form-label">Umur</label>
                    <input type="number"
                           id="userAge"
                           class="form-control"
                           placeholder="Contoh: 20"
                           required>
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit"
                            id="btnSubmit"
                            class="btn btn-primary w-100">
                        Simpan Data
                    </button>

                    <button type="button"
                            id="btnCancel"
                            class="btn btn-secondary ms-2"
                            style="display:none;"
                            onclick="resetForm()">
                        Batal
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Umur</th>
        <th>Aksi</th>
    </tr>
    </thead>
    <tbody id="userTableBody">
    </tbody>
</table>

<script>
    const apiUrl = '/api/users';
    let isUpdate = false;

    $(document).ready(function () {
        loadUsers();

        $('#userForm').submit(function (e) {
            e.preventDefault();

            const userData = {
                name: $('#userName').val(),
                age: parseInt($('#userAge').val())
            };

            if (isUpdate) {
                const id = $('#userId').val();
                updateUser(id, userData);
            } else {
                addUser(userData);
            }
        });
    });

    function loadUsers() {
        $.get(apiUrl, function (response) {
            let rows = '';

            response.data.forEach(user => {
                rows += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.age}</td>
                        <td>
                            <button class="btn btn-warning btn-sm"
                                onclick="editUser('${user.id}','${user.name}',${user.age})">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm"
                                onclick="deleteUser('${user.id}')">
                                Hapus
                            </button>
                        </td>
                    </tr>
                `;
            });

            $('#userTableBody').html(rows);
        });
    }

    function addUser(userData) {
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(userData),
            success: function () {
                resetForm();
                loadUsers();
            },
            error: function (err) {
                alert("Gagal menambahkan user");
                console.error(err);
            }
        });
    }

    function updateUser(id, userData) {
        $.ajax({
            url: apiUrl + '/' + id,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(userData),
            success: function () {
                resetForm();
                loadUsers();
            },
            error: function (err) {
                alert("Gagal update user");
                console.error(err);
            }
        });
    }

    function deleteUser(id) {
        if (confirm("Yakin ingin menghapus user ini?")) {
            $.ajax({
                url: apiUrl + '/' + id,
                type: 'DELETE',
                success: function () {
                    loadUsers();
                },
                error: function (err) {
                    alert("Gagal hapus user");
                    console.error(err);
                }
            });
        }
    }

    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name);
        $('#userAge').val(age);

        isUpdate = true;
        $('#formTitle').text('Update User');
        $('#btnSubmit').text('Update Data');
        $('#btnCancel').show();
    }

    function resetForm() {
        $('#userForm')[0].reset();
        $('#userId').val('');
        isUpdate = false;
        $('#formTitle').text('Tambah User');
        $('#btnSubmit').text('Simpan Data');
        $('#btnCancel').hide();
    }
</script>

</body>
</html>
